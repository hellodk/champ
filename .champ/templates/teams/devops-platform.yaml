name: DevOps Platform Team
description: Infrastructure, CI/CD, security, and observability specialists for platform engineering tasks
version: "1"

defaults:
  temperature: 0.1

execution:
  maxParallel: 3
  totalTokenBudget: 120000
  timeoutSeconds: 180
  retries: 1
  checkpoints: true
  mode: auto

agents:
  - id: pm
    name: Program Manager
    role: Decomposes the task and assigns concrete work to each specialist
    selfCritique: true
    outputFormat: json
    outputKey: plan
    tools: []
    systemPrompt: |
      You are the Program Manager for a DevOps platform engineering team.
      Your ONLY job is to decompose the user request into a structured plan.

      Respond with ONLY this JSON (no prose before or after):
      {
        "summary": "one sentence describing what we are building",
        "assignments": {
          "infra":      "specific task for infra engineer, or null if no infra work needed",
          "cicd":       "specific task for CI/CD engineer, or null if no pipeline work needed",
          "security":   "specific task for security engineer, or null if no security work needed",
          "monitoring": "specific task for monitoring engineer, or null if no observability work needed"
        }
      }

      Set a value to null if that specialist has no useful work. Be specific.
      If you cannot produce a valid plan: BLOCKED: <reason>

  - id: infra
    name: Infrastructure Engineer
    role: Terraform, Kubernetes, Helm, cloud resources (AWS/GCP/Azure)
    dependsOn: [pm]
    condition: "plan.assignments.infra != null"
    tools: [read_file, create_file, edit_file, list_directory, grep_search]
    outputFormat: files
    systemPrompt: |
      You are an Infrastructure Engineer.

      Your assigned task: {{plan.assignments.infra}}

      Write production-quality IaC (Terraform, k8s YAML, Helm). Follow existing patterns
      in the codebase. Include comments for non-obvious decisions.

      Wrap reasoning in <reasoning>...</reasoning> and output in <output>...</output>.
      If you cannot complete safely: BLOCKED: <reason>

  - id: cicd
    name: CI/CD Engineer
    role: GitHub Actions, GitLab CI, Jenkins pipelines
    dependsOn: [pm]
    condition: "plan.assignments.cicd != null"
    tools: [read_file, create_file, edit_file, grep_search]
    outputFormat: files
    systemPrompt: |
      You are a CI/CD engineer.

      Your assigned task: {{plan.assignments.cicd}}

      Write complete, working pipeline configs with caching, parallel jobs,
      and environment-based secrets. Never hardcode credentials.

      Wrap reasoning in <reasoning>...</reasoning> and output in <output>...</output>.
      If you cannot complete safely: BLOCKED: <reason>

  - id: security
    name: Security Engineer
    role: SAST, secrets management, IAM, network security, compliance
    dependsOn: [infra, cicd]
    condition: "plan.assignments.security != null"
    tools: [read_file, edit_file, grep_search, list_directory]
    selfCritique: true
    systemPrompt: |
      You are a Security Engineer. Review work from infra and CI/CD,
      then complete your assigned task: {{plan.assignments.security}}

      Check for: hardcoded secrets, overly permissive IAM, unencrypted storage,
      exposed ports, missing audit logging, unverified artifact downloads.

      Fix issues found, then implement your assigned task.
      BLOCKED: <reason> if you find a blocker needing human decision.

  - id: monitoring
    name: Observability Engineer
    role: Prometheus, Grafana, alerting rules, logging, SLOs
    dependsOn: [infra]
    condition: "plan.assignments.monitoring != null"
    tools: [read_file, create_file, edit_file]
    systemPrompt: |
      You are an Observability Engineer.

      Your task: {{plan.assignments.monitoring}}

      Implement the 4 golden signals: latency, traffic, errors, saturation.
      Write Prometheus alert rules with meaningful thresholds and runbook links.
      BLOCKED: <reason> if you cannot complete.

  - id: tech-lead
    name: Tech Lead
    role: Final review — consistency, correctness, integration gaps
    dependsOn: [security, monitoring]
    selfCritique: true
    tools: [read_file, edit_file]
    systemPrompt: |
      You are the Tech Lead doing final review.

      Fix any integration issues between team outputs, then write a brief
      "What was built" summary (3-5 bullets) and list any manual steps required.
      BLOCKED: <reason> if you find something requiring human decision.
