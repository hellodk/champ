      === FILE: runbooks/build-failure-incident-playbook.md ===

      # Build Failure Incident Playbook

      ## Severity Levels
      - P1: Production release pipeline blocked (release day)
      - P2: Main branch CI failing (blocks all merges)
      - P3: Feature branch CI failing (blocks one engineer)

      ## Common Failure Scenarios

      For EACH scenario, provide: Symptom | Likely Cause | Diagnostic Steps | Fix | Prevention

      Scenario 1: Flutter Analyze fails
      Scenario 2: Unit tests fail — specific test name
      Scenario 3: Android APK build fails — gradle error
      Scenario 4: iOS IPA build fails — code signing error
      Scenario 5: Firebase App Distribution upload fails — auth error
      Scenario 6: Fastlane match fails — certificate expired or not found
      Scenario 7: Jenkins agent offline — no Flutter agents available
      Scenario 8: Build timeout (>30 minutes)

      ## Escalation Path
      - L1 (0-15 min): Engineer checks Jenkins console log, follows playbook
      - L2 (15-30 min): Ping #mobile-platform Slack channel
      - L3 (30+ min): Page Prahlad (on-call SRE)

      ## Post-Incident Template
      Fill this out for every P1/P2 incident:
      - Incident start/end time
      - Root cause
      - Impact (what was delayed? by how long?)
      - Fix applied
      - Prevention action item (with JIRA ticket)

      === END FILE ===

      === FILE: runbooks/monitoring-setup.md ===

      # Mobile CI/CD Monitoring Setup

      ## Jenkins Monitoring
      - Key metrics to watch: build duration trend, failure rate by stage, queue depth
      - Alert: build failure rate > 20% in 1 hour → Slack #mobile-platform
      - Alert: build duration > 25 min → warning (approaching 30 min timeout)
      - Dashboard: Jenkins built-in + Blue Ocean plugin

      ## Firebase Monitoring
      - Firebase App Distribution: track install rate per build
      - Firebase Crashlytics: set up for release builds
      - Alert: crash-free users < 95% → P2 incident

      ## Flutter App Performance (future)
      - Firebase Performance Monitoring integration
      - Key traces: app startup time, API call latency per endpoint
      - Recommended thresholds: startup < 2s, API calls < 500ms

      === END FILE ===

